# Netlify Configuration for Ledger Studio Frontend
# 
# LOCAL DEVELOPMENT:
# 1. Install Netlify CLI: npm install -g netlify-cli
# 2. Start backend: cd backend && python -m uvicorn app.main:app --reload
# 3. Start frontend: cd frontend && netlify dev
# 4. Access at: http://localhost:3000 (frontend pointing to http://localhost:8000 backend)
#
# PRODUCTION:
# - Frontend deployed on Netlify at samsanbook.netlify.app
# - Backend deployed separately and accessible at https://your-backend-domain.com/api/v1
# - Update config.js with your backend URL OR set VITE_API_URL in Netlify environment variables

[build]
  command = "echo 'Frontend ready'"
  publish = "."

# Development server configuration
[dev]
  command = "echo 'Frontend running on Netlify dev server'"
  port = 3000
  # If you set up a local proxy, point to it here

# API proxying during local development
[[redirects]]
  from = "/api/*"
  to = "http://localhost:8000/api/:splat"
  status = 200
  force = false

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
