# Netlify Configuration for Ledger Studio Frontend

[build]
  command = "echo 'Frontend ready'"
  publish = "frontend"

# Content-Type headers for JavaScript modules
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/js/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/js/**/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

# CSS headers
[[headers]]
  for = "/css/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/css/**/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

# SPA fallback - redirect all non-file requests to index.html
# This rule has low priority, so it only matches if no file is found
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
