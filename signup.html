<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Samsan Books</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 2.5rem;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        .footer-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .footer-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon" style="margin: 0 auto 1.5rem;"></div>
            <h1>Join Samsan Books</h1>
            <p>Create your account to start managing your finances</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label>FULL NAME</label>
                <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>EMAIL ADDRESS</label>
                <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="8">
            </div>
            <div class="form-group">
                <label>CONFIRM PASSWORD</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">
                Create Account
            </button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script type="module">
        import { signup } from './js/modules/auth/auth.service.js';

        const form = document.getElementById('signupForm');
        const errorDiv = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await signup({ fullName, email, password });
                if (response.success) {
                    window.location.href = 'login.html?signup=success';
                } else {
                    errorDiv.textContent = response.message || 'Signup failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'An unexpected error occurred';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
